site_name: Azure Networking Practical Guide
site_url: https://yeongseon.github.io/azure-networking-practical-guide/
site_description: Azure Networking practical guide — connectivity design, operations, and troubleshooting grounded in MS Learn
site_author: yeongseon

repo_name: yeongseon/azure-networking-practical-guide
repo_url: https://github.com/yeongseon/azure-networking-practical-guide

theme:
  name: material
  language: en
  custom_dir: docs
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-zoom.js

plugins:
  - search
  - minify:
      minify_html: true

validation:
  nav:
    omitted_files: warn
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.mark
  - attr_list
  - md_in_html
  - pymdownx.emoji
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Start Here:
    - start-here/index.md
    - Overview: start-here/overview.md
    - Learning Path: start-here/learning-path.md
    - Networking vs Connectivity: start-here/networking-vs-connectivity.md
    - Common Scenarios: start-here/common-scenarios.md
  - Platform:
    - platform/index.md
    - How Azure Networking Works: platform/how-azure-networking-works.md
    - VNet and Subnet Basics: platform/vnet-and-subnet-basics.md
    - IP Addressing: platform/ip-addressing.md
    - DNS Basics: platform/dns-basics.md
    - Routing Basics: platform/routing-basics.md
    - Network Security Basics: platform/network-security-basics.md
    - Load Balancing Options: platform/load-balancing-options.md
    - Private Connectivity Options: platform/private-connectivity-options.md
    - Hybrid Connectivity Basics: platform/hybrid-connectivity-basics.md
  - Best Practices:
    - best-practices/index.md
    - Network Design Baseline: best-practices/network-design-baseline.md
    - Subnet Design: best-practices/subnet-design-best-practices.md
    - DNS: best-practices/dns-best-practices.md
    - Routing: best-practices/routing-best-practices.md
    - NSG and Firewall: best-practices/nsg-and-firewall-best-practices.md
    - Private Endpoint: best-practices/private-endpoint-best-practices.md
    - Hybrid Connectivity: best-practices/hybrid-connectivity-best-practices.md
    - Observability: best-practices/observability-best-practices.md
    - Cost Awareness: best-practices/cost-awareness-best-practices.md
    - Common Anti-Patterns: best-practices/common-anti-patterns.md
  - Operations:
    - operations/index.md
    - Create VNet and Subnets: operations/create-vnet-and-subnets.md
    - Configure NSG: operations/configure-nsg.md
    - Configure DNS: operations/configure-dns.md
    - Configure UDR: operations/configure-udr.md
    - Connect Private Endpoints: operations/connect-private-endpoints.md
    - Peering Basics: operations/peering-basics.md
    - VPN and ExpressRoute Basics: operations/vpn-and-expressroute-basics.md
    - Monitor Network Paths: operations/monitor-network-paths.md
    - Packet Capture and Diagnostics: operations/packet-capture-and-diagnostics.md
  - Troubleshooting:
    - troubleshooting/index.md
    - Architecture Overview: troubleshooting/architecture-overview.md
    - Decision Tree: troubleshooting/decision-tree.md
    - Evidence Map: troubleshooting/evidence-map.md
    - Mental Model: troubleshooting/mental-model.md
    - Quick Diagnosis Cards: troubleshooting/quick-diagnosis-cards.md
    - First 10 Minutes:
      - troubleshooting/first-10-minutes/index.md
      - Connectivity: troubleshooting/first-10-minutes/connectivity.md
      - DNS: troubleshooting/first-10-minutes/dns.md
      - Routing: troubleshooting/first-10-minutes/routing.md
    - Playbooks:
      - troubleshooting/playbooks/index.md
